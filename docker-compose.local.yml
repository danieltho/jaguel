services:
  nginx:
    ports:
      - "8000:80"

  db:
    ports:
      - "3306:3306"
  node:
    image: node:20-alpine
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    networks:
      - jaguelapp
    command: sh -c "npm install && npm run dev"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - jaguelapp