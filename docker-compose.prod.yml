services:
  app:
    restart: unless-stopped
    volumes:
      - app_code:/var/www                                       # ← código compartido
      - app_storage:/var/www/storage                            # storage persistente
      - ./.env:/var/www/.env
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      db:
        condition: service_healthy

  queue:
    restart: unless-stopped
    volumes:
      - app_code:/var/www                                       # mismo código que app
      - app_storage:/var/www/storage                            # mismo storage
      - ./.env:/var/www/.env
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

  nginx:
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}                                         # ← dominio leído del .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_code:/var/www:ro                                    # ← mismo código que app
      - app_storage:/var/www/storage:ro                         # ← mismo storage
      - ./docker/nginx/templates:/etc/nginx/templates:ro        # ← envsubst genera conf.d/default.conf
      - certbot_certs:/etc/letsencrypt                          # ← certificados emitidos
      - certbot_www:/var/www/certbot                            # ← webroot del challenge ACME

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Reintenta la renovación cada 12h; certbot solo renueva si faltan <30 días.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"

  db:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_code:
  app_storage:
  certbot_certs:
  certbot_www: