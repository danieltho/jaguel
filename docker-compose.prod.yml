services:
  app:
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  nginx:
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"

  db:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  node:
    image: node:20-alpine
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - jaguelapp
    profiles: ["build"]
    command: sh -c "npm ci && npm run build"