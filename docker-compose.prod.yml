services:
  app:
    restart: unless-stopped
    volumes:
      - app_code:/var/www                                       # ← código compartido
      - app_storage:/var/www/storage                            # storage persistente
      - ./.env:/var/www/.env
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      db:
        condition: service_healthy

  queue:
    restart: unless-stopped
    volumes:
      - app_code:/var/www                                       # mismo código que app
      - app_storage:/var/www/storage                            # mismo storage
      - ./.env:/var/www/.env
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

  nginx:
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}                                         # ← dominio leído del .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_code:/var/www:ro                                    # ← mismo código que app
      - app_storage:/var/www/storage:ro                         # ← mismo storage
      - ./docker/nginx/templates:/etc/nginx/templates:ro        # ← envsubst genera conf.d/default.conf
      - /etc/ssl/cloudflare:/etc/nginx/ssl:ro                   # ← Cloudflare Origin Certificate (origin.pem + origin.key)

  db:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_code:
  app_storage: