services:
  app:
    restart: unless-stopped
    volumes:
      - app_code:/var/www                                       # ← código compartido
      - app_storage:/var/www/storage                            # storage persistente
      - ./.env:/var/www/.env
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      db:
        condition: service_healthy

  queue:
    restart: unless-stopped
    volumes:
      - app_code:/var/www                                       # mismo código que app
      - app_storage:/var/www/storage                            # mismo storage
      - ./.env:/var/www/.env
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

  nginx:
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - app_code:/var/www:ro                                    # ← mismo código que app
      - app_storage:/var/www/storage:ro                         # ← mismo storage
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro

  db:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_code:
  app_storage: